# ========================================
# SONARCLOUD CONFIGURATION
# ========================================

sonar.projectKey=Heri1504_practica-de-laboratorio
sonar.projectName=practica-de-laboratorio
sonar.organization=heri1504
sonar.projectVersion=1.0

# ========================================
# SOURCE CODE
# ========================================

sonar.sources=.
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx

sonar.exclusions=\
node_modules/**,\
.git/**,\
dist/**,\
build/**,\
coverage/**,\
logs/**,\
**/*.test.js,\
**/*.spec.js

sonar.sourceEncoding=UTF-8

# ========================================
# JAVASCRIPT / TYPESCRIPT
# ========================================

sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# ========================================
# EXTERNAL REPORTS
# ========================================

sonar.externalIssuesReportPaths=eslint-report.json,vulnerabilities-report.json

# ========================================
# SECURITY
# ========================================

sonar.security.hotspots.enabled=true

# ========================================
# COVERAGE
# ========================================

sonar.coverage.exclusions=\
node_modules/**,\
**/*.test.js,\
**/*.spec.js

# ========================================
# DUPLICATIONS
# ========================================

sonar.cpd.exclusions=\
**/*.test.js,\
**/*.spec.js